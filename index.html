<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩记录与分析</title>
    <!-- 引入 Supabase 官方 JS 库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-subtle: #94a3b8;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC",
                "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ========== 头部 ========== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            flex-shrink: 0;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ========== 按钮 ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            border: none;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--primary);
            color: #fff;
            white-space: nowrap;
            text-decoration: none;
            letter-spacing: 0.2px;
        }
        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-main);
        }
        .btn-outline:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: var(--danger-hover);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            gap: 3px;
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            padding: 4px 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px;
            transition: all var(--transition);
        }
        .btn-ghost:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }

        /* ========== 统计卡片 ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 18px 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            border-radius: 0 3px 3px 0;
            opacity: 0.6;
        }
        .stat-card:nth-child(2)::before {
            background: #f59e0b;
        }
        .stat-card:nth-child(3)::before {
            background: #10b981;
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }
        .stat-sub {
            font-size: 11px;
            color: var(--text-subtle);
            margin-top: 2px;
        }

        /* ========== 表格区域 ========== */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .table-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: #fafbfc;
        }
        .table-header-title {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.2px;
        }
        .table-header-subtitle {
            font-size: 11px;
            color: var(--text-subtle);
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            white-space: nowrap;
            min-width: 1200px;
        }
        thead th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 10px 12px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1;
        }
        thead th .th-sub {
            font-weight: 400;
            font-size: 10px;
            color: var(--text-subtle);
            display: block;
            text-transform: none;
            letter-spacing: 0;
        }
        tbody td {
            padding: 9px 12px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-main);
        }
        tbody tr {
            transition: background var(--transition);
        }
        tbody tr:hover {
            background: #f8fafc;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }
        .cell-score {
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .cell-rank {
            font-variant-numeric: tabular-nums;
            font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
            font-size: 12px;
            color: var(--text-muted);
        }
        .cell-rank-high {
            color: #ef4444;
            font-weight: 600;
        }
        .cell-scaled {
            font-size: 10px;
            color: var(--text-subtle);
            display: block;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        .actions-cell {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .loading-row td {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            width: 100%;
            max-width: 850px;
            max-height: 90vh;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafbfc;
        }
        .modal-header h3 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            line-height: 1;
        }
        .close-modal:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        .modal-body {
            padding: 20px 22px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 14px 22px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            background: #fafbfc;
        }

        /* 表单 */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.2px;
        }
        .form-group input,
        .form-group select {
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all var(--transition);
            background: #fff;
            color: var(--text-main);
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
        }
        .form-group input::placeholder {
            color: #cbd5e1;
        }
        .form-full {
            grid-column: span 2;
        }
        .form-section-title {
            grid-column: span 2;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            padding-top: 8px;
            margin-top: 4px;
            border-top: 1px solid #f1f5f9;
            letter-spacing: 0.3px;
        }
        .form-section-title:first-child {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 2000;
            transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.2px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #dc2626;
        }

        /* ========== 移动端适应 ========== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            h1 {
                font-size: 18px;
            }
            .btn {
                padding: 7px 14px;
                font-size: 13px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-full,
            .form-section-title,
            .col-span-2 {
                grid-column: span 1;
            }
            .modal {
                max-width: 100%;
                border-radius: 16px 16px 0 0;
                max-height: 95vh;
            }
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .stat-card {
                padding: 12px 10px;
            }
            .stat-value {
                font-size: 20px;
            }
            .stat-label {
                font-size: 10px;
            }
            table {
                min-width: 900px;
                font-size: 11px;
            }
            thead th {
                font-size: 10px;
                padding: 8px 6px;
            }
            tbody td {
                padding: 7px 6px;
                font-size: 11px;
            }
            .modal-body {
                padding: 14px;
            }
            .modal-header {
                padding: 12px 16px;
            }
            .modal-footer {
                padding: 10px 16px;
            }
        }
        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }
            .stat-card {
                padding: 10px 8px;
            }
            .stat-value {
                font-size: 18px;
            }
            .header-actions {
                width: 100%;
            }
            .header-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="header-left">
                <div class="header-icon">📊</div>
                <h1>成绩记录与分析</h1>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="window.openAddModal()">
                    <span>＋</span> 添加记录
                </button>
                <button class="btn btn-outline" onclick="window.refreshData()">
                    <span>🔄</span> 刷新
                </button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">📋 总记录数</div>
                <div class="stat-value" id="totalRecords">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📈 平均总分</div>
                <div class="stat-value" id="avgScore">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🏆 最高总分</div>
                <div class="stat-value" id="maxScore">—</div>
            </div>
        </div>

        <!-- 主表格 -->
        <div class="table-wrapper">
            <div class="table-header">
                <span class="table-header-title">📝 成绩列表</span>
                <span class="table-header-subtitle" id="tableInfo">加载中…</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>操作</th>
                            <th>考试类型</th>
                            <th>总分</th>
                            <th>区名</th>
                            <th>校名</th>
                            <th>班名</th>
                            <th>主科</th>
                            <th>语文</th>
                            <th>数学</th>
                            <th>英语</th>
                            <th>三科</th>
                            <th>历史</th>
                            <th>政治<br><span class="th-sub">原始 / 赋分</span></th>
                            <th>地理<br><span class="th-sub">原始 / 赋分</span></th>
                        </tr>
                    </thead>
                    <tbody id="examTableBody">
                        <tr class="loading-row">
                            <td colspan="14">
                                <span class="loading-spinner"></span>正在加载数据…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加成绩记录</h3>
                <button class="close-modal" onclick="window.closeModal()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <form id="examForm" autocomplete="off">
                    <input type="hidden" id="editId">
                    <div class="form-grid">
                        <!-- 考试类型 -->
                        <div class="form-group form-full">
                            <label>📌 考试类型 *</label>
                            <input type="text" id="exam_type" placeholder="例如：高一上期末、一模、二模…" required>
                        </div>

                        <!-- 基础总分与排名 -->
                        <div class="form-section-title">📊 总分与综合排名</div>
                        <div class="form-group"><label>总分</label><input type="number" step="0.1" id="total_score" placeholder="0.0"></div>
                        <div class="form-group"><label>区排名</label><input type="number" id="rank_district" placeholder="—"></div>
                        <div class="form-group"><label>校排名</label><input type="number" id="rank_school" placeholder="—"></div>
                        <div class="form-group"><label>班排名</label><input type="number" id="rank_class" placeholder="—"></div>
                        <div class="form-group"><label>主科总分</label><input type="number" step="0.1" id="main_subjects_score" placeholder="0.0"></div>
                        <div class="form-group"></div>

                        <!-- 语文 -->
                        <div class="form-section-title">📖 语文</div>
                        <div class="form-group"><label>语文分数</label><input type="number" step="0.1" id="chinese_score" placeholder="0.0"></div>
                        <div class="form-group"><label>语文 · 区排名</label><input type="number" id="chinese_rank_district" placeholder="—"></div>
                        <div class="form-group"><label>语文 · 校排名</label><input type="number" id="chinese_rank_school" placeholder="—"></div>
                        <div class="form-group"><label>语文 · 班排名</label><input type="number" id="chinese_rank_class" placeholder="—"></div>

                        <!-- 数学 -->
                        <div class="form-section-title">📐 数学</div>
                        <div class="form-group"><label>数学分数</label><input type="number" step="0.1" id="math_score" placeholder="0.0"></div>
                        <div class="form-group"><label>数学 · 区排名</label><input type="number" id="math_rank_district" placeholder="—"></div>
                        <div class="form-group"><label>数学 · 校排名</label><input type="number" id="math_rank_school" placeholder="—"></div>
                        <div class="form-group"><label>数学 · 班排名</label><input type="number" id="math_rank_class" placeholder="—"></div>

                        <!-- 英语 -->
                        <div class="form-section-title">🌐 英语</div>
                        <div class="form-group"><label>英语分数</label><input type="number" step="0.1" id="english_score" placeholder="0.0"></div>
                        <div class="form-group"><label>英语 · 区排名</label><input type="number" id="english_rank_district" placeholder="—"></div>
                        <div class="form-group"><label>英语 · 校排名</label><input type="number" id="english_rank_school" placeholder="—"></div>
                        <div class="form-group"><label>英语 · 班排名</label><input type="number" id="english_rank_class" placeholder="—"></div>

                        <!-- 三科汇总 -->
                        <div class="form-section-title">🧮 三科汇总</div>
                        <div class="form-group"><label>三科总分</label><input type="number" step="0.1" id="three_subjects_sum" placeholder="0.0"></div>
                        <div class="form-group"></div>

                        <!-- 历史 -->
                        <div class="form-section-title">📜 历史</div>
                        <div class="form-group"><label>历史分数</label><input type="number" step="0.1" id="history_score" placeholder="0.0"></div>
                        <div class="form-group"><label>历史 · 区排名</label><input type="number" id="history_rank_district" placeholder="—"></div>
                        <div class="form-group"><label>历史 · 校排名</label><input type="number" id="history_rank_school" placeholder="—"></div>
                        <div class="form-group"><label>历史 · 班排名</label><input type="number" id="history_rank_class" placeholder="—"></div>

                        <!-- 政治 -->
                        <div class="form-section-title">⚖️ 政治</div>
                        <div class="form-group"><label>政治原始分</label><input type="number" step="0.1" id="politics_score" placeholder="0.0"></div>
                        <div class="form-group"><label>政治 · 赋分</label><input type="number" step="0.1" id="politics_scaled_score" placeholder="0.0"></div>
                        <div class="form-group"><label>政治 · 区排名</label><input type="number" id="politics_rank_district" placeholder="—"></div>
                        <div class="form-group"><label>政治 · 校排名</label><input type="number" id="politics_rank_school" placeholder="—"></div>
                        <div class="form-group"><label>政治 · 班排名</label><input type="number" id="politics_rank_class" placeholder="—"></div>

                        <!-- 地理 -->
                        <div class="form-section-title">🌍 地理</div>
                        <div class="form-group"><label>地理原始分</label><input type="number" step="0.1" id="geography_score" placeholder="0.0"></div>
                        <div class="form-group"><label>地理 · 赋分</label><input type="number" step="0.1" id="geography_scaled_score" placeholder="0.0"></div>
                        <div class="form-group"><label>地理 · 区排名</label><input type="number" id="geography_rank_district" placeholder="—"></div>
                        <div class="form-group"><label>地理 · 校排名</label><input type="number" id="geography_rank_school" placeholder="—"></div>
                        <div class="form-group"><label>地理 · 班排名</label><input type="number" id="geography_rank_class" placeholder="—"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="window.closeModal()">取消</button>
                <button class="btn" id="saveBtn" onclick="window.saveRecord()">💾 保存记录</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 配置区 ====================
            const SUPABASE_CONFIG = {
                url: 'https://ogfzjjlzxpxosnyxjxci.supabase.co',
                anonKey: 'sb_publishable_WvalsHmw093vcsHkKMIU5w_0ozf0XOE'
            };
            const TABLE_NAME = 'exams';
            // ================================================

            // 初始化 Supabase（CDN 加载后全局变量名为 supabase）
            const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

            // 全局暴露
            window.supabase = supabaseClient;

            // DOM 元素
            const tbody = document.getElementById('examTableBody');
            const modal = document.getElementById('modalOverlay');
            const form = document.getElementById('examForm');
            const modalTitle = document.getElementById('modalTitle');
            const editIdInput = document.getElementById('editId');
            const saveBtn = document.getElementById('saveBtn');
            const tableInfo = document.getElementById('tableInfo');
            const toastEl = document.getElementById('toast');

            let isEditMode = false;
            let toastTimer = null;

            // Toast 提示
            function showToast(message, type = '') {
                if (toastTimer) clearTimeout(toastTimer);
                toastEl.textContent = message;
                toastEl.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 2200);
            }

            // ============ 数据获取 ============
            async function fetchData() {
                // 显示加载状态
                tbody.innerHTML = `
                        <tr class="loading-row">
                            <td colspan="14">
                                <span class="loading-spinner"></span>正在加载数据…
                            </td>
                        </tr>`;
                tableInfo.textContent = '加载中…';

                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    tbody.innerHTML = `
                            <tr>
                                <td colspan="14" class="empty-state">
                                    <span class="empty-icon">⚠️</span>
                                    数据加载失败：${error.message}
                                    <br><button class="btn btn-sm btn-outline" style="margin-top:10px;" onclick="window.refreshData()">重试</button>
                                </td>
                            </tr>`;
                    tableInfo.textContent = '加载失败';
                    updateStats([]);
                    showToast('数据加载失败，请检查网络连接', 'error');
                    return;
                }

                renderTable(data);
                updateStats(data);
                tableInfo.textContent = `共 ${data.length} 条记录 · 通过 Supabase 同步`;
            }

            // ============ 渲染表格 ============
            function renderTable(data) {
                tbody.innerHTML = '';
                if (!data || data.length === 0) {
                    tbody.innerHTML = `
                            <tr>
                                <td colspan="14" class="empty-state">
                                    <span class="empty-icon">📭</span>
                                    暂无成绩数据
                                    <br><span style="font-size:12px;color:#94a3b8;">点击右上角「添加记录」开始录入</span>
                                </td>
                            </tr>`;
                    return;
                }

                data.forEach(row => {
                    const tr = document.createElement('tr');
                    const politicsDisplay = buildScaledDisplay(row.politics_score, row
                        .politics_scaled_score);
                    const geographyDisplay = buildScaledDisplay(row.geography_score, row
                        .geography_scaled_score);

                    tr.innerHTML = `
                            <td>
                                <div class="actions-cell">
                                    <button class="btn btn-sm btn-outline" onclick="window.editRecord('${row.id}')" title="编辑">✏️</button>
                                    <button class="btn btn-sm btn-danger" onclick="window.deleteRecord('${row.id}')" title="删除">🗑</button>
                                </div>
                            </td>
                            <td><strong>${escapeHtml(row.exam_type) || '—'}</strong></td>
                            <td class="cell-score">${formatNum(row.total_score)}</td>
                            <td class="cell-rank">${formatRank(row.rank_district)}</td>
                            <td class="cell-rank">${formatRank(row.rank_school)}</td>
                            <td class="cell-rank">${formatRank(row.rank_class)}</td>
                            <td class="cell-score">${formatNum(row.main_subjects_score)}</td>
                            <td class="cell-score">${formatNum(row.chinese_score)}</td>
                            <td class="cell-score">${formatNum(row.math_score)}</td>
                            <td class="cell-score">${formatNum(row.english_score)}</td>
                            <td class="cell-score">${formatNum(row.three_subjects_sum)}</td>
                            <td class="cell-score">${formatNum(row.history_score)}</td>
                            <td>${politicsDisplay}</td>
                            <td>${geographyDisplay}</td>
                        `;
                    tbody.appendChild(tr);
                });
            }

            function buildScaledDisplay(rawScore, scaledScore) {
                const raw = formatNum(rawScore);
                const scaled = formatNum(scaledScore);
                if (raw === '—' && scaled === '—') return '—';
                return `${raw} <span class="cell-scaled">赋分: ${scaled}</span>`;
            }

            function formatNum(val) {
                if (val === null || val === undefined || val === '') return '—';
                const num = parseFloat(val);
                if (isNaN(num)) return '—';
                // 如果是整数就不显示小数
                return Number.isInteger(num) ? num.toString() : num.toFixed(1);
            }

            function formatRank(val) {
                if (val === null || val === undefined || val === '') return '—';
                const num = parseInt(val);
                if (isNaN(num)) return '—';
                // 排名靠前高亮
                if (num <= 10) return `<span class="cell-rank-high">${num}</span>`;
                return num.toString();
            }

            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ 更新统计 ============
            function updateStats(data) {
                const totalEl = document.getElementById('totalRecords');
                const avgEl = document.getElementById('avgScore');
                const maxEl = document.getElementById('maxScore');

                if (!data || data.length === 0) {
                    totalEl.textContent = '0';
                    avgEl.textContent = '—';
                    maxEl.textContent = '—';
                    return;
                }

                totalEl.textContent = data.length;

                let totalSum = 0,
                    count = 0,
                    maxS = -Infinity;
                data.forEach(row => {
                    if (row.total_score !== null && row.total_score !== undefined && row.total_score !== '') {
                        const val = parseFloat(row.total_score);
                        if (!isNaN(val)) {
                            totalSum += val;
                            count++;
                            if (val > maxS) maxS = val;
                        }
                    }
                });

                avgEl.textContent = count > 0 ? (totalSum / count).toFixed(1) : '—';
                maxEl.textContent = maxS > -Infinity ? maxS : '—';
            }

            // ============ 模态框操作 ============
            window.openAddModal = function() {
                isEditMode = false;
                modalTitle.textContent = '✏️ 添加成绩记录';
                editIdInput.value = '';
                form.reset();
                saveBtn.textContent = '💾 保存记录';
                modal.classList.add('active');
                // 聚焦第一个输入框
                setTimeout(() => {
                    document.getElementById('exam_type').focus();
                }, 150);
            };

            window.editRecord = async function(id) {
                isEditMode = true;
                modalTitle.textContent = '✏️ 编辑成绩记录';
                editIdInput.value = id;
                saveBtn.textContent = '💾 更新记录';

                // 先显示加载状态
                modal.classList.add('active');

                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .eq('id', id)
                    .single();

                if (error) {
                    showToast('获取数据失败: ' + error.message, 'error');
                    closeModal();
                    return;
                }

                if (!data) {
                    showToast('未找到该记录', 'error');
                    closeModal();
                    return;
                }

                // 填充表单
                const fields = [
                    'exam_type', 'total_score', 'rank_district', 'rank_school', 'rank_class',
                    'main_subjects_score',
                    'chinese_score', 'chinese_rank_district', 'chinese_rank_school', 'chinese_rank_class',
                    'math_score', 'math_rank_district', 'math_rank_school', 'math_rank_class',
                    'english_score', 'english_rank_district', 'english_rank_school', 'english_rank_class',
                    'three_subjects_sum',
                    'history_score', 'history_rank_district', 'history_rank_school', 'history_rank_class',
                    'politics_score', 'politics_scaled_score', 'politics_rank_district', 'politics_rank_school',
                    'politics_rank_class',
                    'geography_score', 'geography_scaled_score', 'geography_rank_district', 'geography_rank_school',
                    'geography_rank_class'
                ];

                fields.forEach(field => {
                    const el = document.getElementById(field);
                    if (el) {
                        const val = data[field];
                        el.value = (val !== null && val !== undefined) ? val : '';
                    }
                });
            };

            window.closeModal = function() {
                modal.classList.remove('active');
                // 清理表单
                form.reset();
                editIdInput.value = '';
            };

            // 点击遮罩关闭
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // ESC 关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });

            // ============ 保存记录 ============
            window.saveRecord = async function() {
                const examType = document.getElementById('exam_type').value.trim();
                if (!examType) {
                    showToast('请输入考试类型', 'error');
                    document.getElementById('exam_type').focus();
                    return;
                }

                // 收集表单数据
                const numericFields = [
                    'total_score', 'rank_district', 'rank_school', 'rank_class', 'main_subjects_score',
                    'chinese_score', 'chinese_rank_district', 'chinese_rank_school', 'chinese_rank_class',
                    'math_score', 'math_rank_district', 'math_rank_school', 'math_rank_class',
                    'english_score', 'english_rank_district', 'english_rank_school', 'english_rank_class',
                    'three_subjects_sum',
                    'history_score', 'history_rank_district', 'history_rank_school', 'history_rank_class',
                    'politics_score', 'politics_scaled_score', 'politics_rank_district', 'politics_rank_school',
                    'politics_rank_class',
                    'geography_score', 'geography_scaled_score', 'geography_rank_district', 'geography_rank_school',
                    'geography_rank_class'
                ];

                const data = {};
                // 考试类型
                data['exam_type'] = examType;

                // 数值字段
                numericFields.forEach(field => {
                    const el = document.getElementById(field);
                    if (el && el.value.trim() !== '') {
                        const val = parseFloat(el.value);
                        if (!isNaN(val)) {
                            data[field] = val;
                        }
                    }
                    // 如果为空则不传该字段（让数据库保持 null）
                });

                const editId = editIdInput.value;
                saveBtn.textContent = '⏳ 保存中…';
                saveBtn.disabled = true;

                let error = null;
                if (editId) {
                    const result = await supabaseClient.from(TABLE_NAME).update(data).eq('id', editId);
                    error = result.error;
                } else {
                    const result = await supabaseClient.from(TABLE_NAME).insert(data);
                    error = result.error;
                }

                saveBtn.textContent = '💾 保存记录';
                saveBtn.disabled = false;

                if (error) {
                    showToast('保存失败: ' + error.message, 'error');
                    console.error('保存失败:', error);
                } else {
                    closeModal();
                    await fetchData();
                    showToast(editId ? '✅ 记录已更新' : '✅ 记录已添加', 'success');
                }
            };

            // ============ 删除记录 ============
            window.deleteRecord = async function(id) {
                if (!confirm('⚠️ 确定要删除这条成绩记录吗？\n\n此操作不可恢复。')) return;

                const { error } = await supabaseClient.from(TABLE_NAME).delete().eq('id', id);
                if (error) {
                    showToast('删除失败: ' + error.message, 'error');
                    console.error('删除失败:', error);
                } else {
                    showToast('🗑 记录已删除', 'success');
                    await fetchData();
                }
            };

            // ============ 刷新数据 ============
            window.refreshData = function() {
                fetchData();
                showToast('🔄 数据已刷新', '');
            };

            // ============ 表单回车提交 ============
            form.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey && e.target.tagName === 'INPUT') {
                    e.preventDefault();
                    // 找到下一个输入框并聚焦
                    const inputs = Array.from(form.querySelectorAll('input:not([type="hidden"])'));
                    const currentIndex = inputs.indexOf(e.target);
                    if (currentIndex < inputs.length - 1) {
                        inputs[currentIndex + 1].focus();
                    } else {
                        // 最后一个输入框，触发保存
                        window.saveRecord();
                    }
                }
            });

            // ============ 初始化 ============
            fetchData();
        })();
    </script>
</body>
</html>
